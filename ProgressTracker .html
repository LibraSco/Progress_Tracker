<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E8EAF6" id="theme-color">
    <title>进度追踪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            /* 白天模式 - 粘土拟态 */
            --bg-primary: #E8EAF6;
            --bg-secondary: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-primary: #2D3142;
            --text-secondary: #9BA3AF;
            --shadow-light: #FFFFFF;
            --shadow-dark: #D1D5DB;
            --accent-purple: #A78BFA;
            --accent-pink: #F472B6;
            --accent-blue: #60A5FA;
            --accent-green: #34D399;
            --accent-yellow: #FBBF24;
            --accent-orange: #FB923C;
            --star-yellow: #FFD700;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }
        
        [data-theme="dark"] {
            /* 黑夜模式 - 粘土拟态 */
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #1f2937;
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --shadow-light: #2d3748;
            --shadow-dark: #0f0f23;
            --accent-purple: #8B5CF6;
            --accent-pink: #EC4899;
            --accent-blue: #3B82F6;
            --accent-green: #10B981;
            --accent-yellow: #F59E0B;
            --accent-orange: #F97316;
            --star-yellow: #FFD700;
            --nav-bg: rgba(31, 41, 55, 0.95);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /* 粘土拟态阴影 */
        .clay-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            transition: all 0.3s ease;
        }
        
        .clay-card:active {
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transform: translateY(2px);
        }
        
        .clay-button {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 20px;
            border: none;
            color: white;
            font-weight: 600;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .clay-button:active {
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
            transform: translateY(2px);
        }
        
        .clay-button.secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }
        
        .clay-input {
            background: var(--bg-primary);
            border: none;
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 16px;
            color: var(--text-primary);
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .clay-input:focus {
            box-shadow: 
                inset 6px 6px 12px var(--shadow-dark),
                inset -6px -6px 12px var(--shadow-light);
        }
        
        .clay-input::placeholder {
            color: var(--text-secondary);
        }
        
        /* 页面容器 */
        .page {
            display: none;
            min-height: 100vh;
            padding-bottom: 100px;
            background: var(--bg-primary);
            transition: background 0.3s ease;
        }
        
        .page.active {
            display: block;
        }
        
        /* 顶部标题栏 */
        .header {
            padding: 50px 20px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 项目列表 */
        .project-list {
            padding: 0 20px 20px;
        }
        
        .project-card {
            background: var(--bg-card);
            border-radius: 24px;
            margin-bottom: 20px;
            padding: 20px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .project-card:active {
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transform: translateY(2px);
        }
        
        .project-card.completed {
            opacity: 0.6;
            filter: grayscale(0.8);
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--card-color, var(--accent-purple));
            border-radius: 24px 0 0 24px;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            padding-left: 12px;
        }
        
        .project-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .project-name {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .project-type-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            box-shadow: 
                inset 2px 2px 4px var(--shadow-dark),
                inset -2px -2px 4px var(--shadow-light);
        }
        
        .project-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .stars {
            display: flex;
            gap: 3px;
        }
        
        .star {
            font-size: 14px;
            color: var(--shadow-dark);
            transition: color 0.2s ease;
        }
        
        .star.filled {
            color: var(--star-yellow);
            text-shadow: 0 0 6px rgba(255, 215, 0, 0.6);
        }
        
        .progress-section {
            padding-left: 12px;
        }
        
        .progress-bar-container {
            height: 12px;
            background: var(--bg-primary);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: 
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card-color, var(--accent-purple));
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .empty-state-subtext {
            font-size: 13px;
            opacity: 0.7;
        }
        
        /* 浮动添加按钮 */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            border: none;
            cursor: pointer;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -4px -4px 12px var(--shadow-light);
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .fab:active {
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -2px -2px 6px var(--shadow-light);
            transform: translateY(2px) scale(0.95);
        }
        
        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 30px;
            box-shadow: 
                0 -4px 20px rgba(0,0,0,0.1);
            z-index: 99;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 16px;
        }
        
        .nav-item:active {
            transform: scale(0.95);
        }
        
        .nav-item.active {
            background: var(--bg-primary);
            box-shadow: 
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
        }
        
        .nav-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-item.active .nav-icon {
            transform: translateY(-2px);
        }
        
        .nav-label {
            font-size: 11px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        
        .nav-item.active .nav-label {
            color: var(--accent-purple);
            font-weight: 600;
        }
        
        /* 创建项目页面 */
        .form-page {
            padding: 20px;
            min-height: 100vh;
        }
        
        .form-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 30px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            cursor: pointer;
            color: var(--text-primary);
            border: none;
            font-size: 20px;
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease;
        }
        
        .back-btn:active {
            box-shadow: 
                2px 2px 4px var(--shadow-dark),
                -2px -2px 4px var(--shadow-light);
            transform: translateY(1px);
        }
        
        .form-header h2 {
            font-size: 22px;
            color: var(--text-primary);
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
            padding-left: 4px;
        }
        
        /* 类型选择器 */
        .type-selector {
            display: flex;
            gap: 12px;
        }
        
        .type-option {
            flex: 1;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            border: 3px solid transparent;
        }
        
        .type-option:active {
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
            transform: translateY(2px);
        }
        
        .type-option.selected {
            border-color: var(--accent-purple);
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
        }
        
        .type-option .type-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .type-option .type-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* 星星选择器 */
        .star-picker {
            display: flex;
            gap: 12px;
            padding: 10px 0;
        }
        
        .star-picker .star {
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--shadow-dark);
        }
        
        .star-picker .star.filled {
            color: var(--star-yellow);
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }
        
        .star-picker .star:active {
            transform: scale(1.3);
        }
        
        .star-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            padding-left: 4px;
        }
        
        /* 颜色选择器 */
        .color-picker {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 10px 0;
        }
        
        .color-option {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }
        
        .color-option:active {
            transform: scale(0.95);
        }
        
        .color-option.selected {
            border-color: var(--text-primary);
            transform: scale(1.1);
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }
        
        /* 子项目数量输入 */
        .subtask-count-section {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
        }
        
        .subtask-count-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .subtask-count-input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            outline: none;
            text-align: center;
        }
        
        .subtask-count-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease;
        }
        
        .subtask-count-btn:active {
            box-shadow: 
                2px 2px 4px var(--shadow-dark),
                -2px -2px 4px var(--shadow-light);
            transform: translateY(1px);
        }
        
        /* 子项目输入列表 */
        .subtasks-input-container {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .subtask-input-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .subtask-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
        }
        
        .subtask-name-input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            outline: none;
        }
        
        .subtask-name-input:focus {
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }
        
        .subtask-name-input::placeholder {
            color: var(--text-secondary);
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            transition: all 0.3s ease;
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .submit-btn:active:not(:disabled) {
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
            transform: translateY(2px);
        }
        
        /* 详情页 */
        .detail-header {
            padding: 50px 20px 30px;
            text-align: center;
            background: var(--bg-card);
            border-radius: 0 0 32px 32px;
            box-shadow: 
                0 8px 32px var(--shadow-dark);
            margin-bottom: 20px;
        }
        
        .detail-priority {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .detail-priority .star {
            color: var(--star-yellow);
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }
        
        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .detail-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .big-progress {
            margin: 20px auto;
            max-width: 280px;
        }
        
        .big-progress-bar {
            height: 24px;
            background: var(--bg-primary);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
        }
        
        .big-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
            border-radius: 16px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
        }
        
        .big-progress-text {
            font-size: 42px;
            font-weight: 700;
            margin-top: 16px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 20px 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* 子任务列表 */
        .subtasks-section {
            margin: 0 20px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
        }
        
        .section-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .detail-subtask-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .detail-subtask-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: var(--bg-card);
            border-radius: 18px;
            transition: all 0.3s ease;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            border-left: 4px solid var(--accent-purple);
        }
        
        .detail-subtask-item.completed {
            opacity: 0.5;
            border-left-color: var(--accent-green);
        }
        
        .detail-subtask-item.completed .detail-subtask-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }
        
        .subtask-checkbox {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            border: 3px solid var(--accent-purple);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
        }
        
        .subtask-checkbox.checked {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-color: transparent;
        }
        
        .detail-subtask-text {
            flex: 1;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        /* 课程进度更新 */
        .update-section {
            margin: 0 20px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
        }
        
        .update-input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .update-input {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            text-align: center;
            font-weight: 600;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            outline: none;
        }
        
        .update-btn {
            padding: 16px 28px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease;
        }
        
        .update-btn:active {
            box-shadow: 
                3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
            transform: translateY(1px);
        }
        
        .delete-btn {
            display: block;
            margin: 20px auto 40px;
            padding: 14px 28px;
            background: transparent;
            color: #EF4444;
            border: 2px solid #EF4444;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .delete-btn:active {
            background: rgba(239, 68, 68, 0.1);
        }
        
        /* 我的页面 */
        .profile-header {
            padding: 60px 20px 30px;
            text-align: center;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 
                10px 10px 20px var(--shadow-dark),
                -10px -10px 20px var(--shadow-light);
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .profile-email {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .settings-section {
            padding: 0 20px;
        }
        
        .settings-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 8px;
            margin-bottom: 20px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
        }
        
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 16px;
            border-radius: 16px;
            transition: all 0.2s ease;
        }
        
        .setting-item:active {
            background: var(--bg-primary);
        }
        
        .setting-item:not(:last-child) {
            border-bottom: 1px solid var(--bg-primary);
        }
        
        .setting-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .setting-icon {
            width: 40px;
            height: 40px;
            background: var(--bg-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }
        
        .setting-info {
            display: flex;
            flex-direction: column;
        }
        
        .setting-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .setting-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        /* 主题切换开关 */
        .theme-toggle {
            width: 56px;
            height: 32px;
            background: var(--bg-primary);
            border-radius: 16px;
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
            transition: all 0.3s ease;
        }
        
        .theme-toggle.active {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
        }
        
        .theme-toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 26px;
            height: 26px;
            background: var(--bg-card);
            border-radius: 50%;
            transition: all 0.3s ease;
            box-shadow: 
                2px 2px 4px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .theme-toggle.active .theme-toggle-thumb {
            transform: translateX(24px);
        }
        
        /* 统计卡片 */
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px 20px;
        }
        
        .profile-stat-card {
            background: var(--bg-card);
            padding: 16px 8px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }
        
        .profile-stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .profile-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 28px;
            width: 100%;
            max-width: 340px;
            box-shadow: 
                20px 20px 60px rgba(0,0,0,0.3);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            text-align: center;
        }
        
        .modal-input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: 
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            outline: none;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .modal-btn.cancel {
            background: var(--bg-primary);
            color: var(--text-secondary);
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }
        
        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }
        
        .modal-btn:active {
            box-shadow: 
                2px 2px 4px var(--shadow-dark),
                -2px -2px 4px var(--shadow-light);
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <!-- 进行中页面 -->
    <div id="ongoing-page" class="page active">
        <div class="header">
            <h1>进行中</h1>
            <p>正在努力的目标</p>
        </div>
        <div class="project-list" id="ongoing-list"></div>
    </div>

    <!-- 已完成页面 -->
    <div id="completed-page" class="page">
        <div class="header">
            <h1>已完成</h1>
            <p>恭喜达成的成就</p>
        </div>
        <div class="project-list" id="completed-list"></div>
    </div>

    <!-- 我的页面 -->
    <div id="profile-page" class="page">
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">👤</div>
            <div class="profile-name" id="profile-name">未设置昵称</div>
            <div class="profile-email">点击设置你的昵称</div>
        </div>
        
        <div class="profile-stats">
            <div class="profile-stat-card">
                <div class="profile-stat-value" id="stat-ongoing">0</div>
                <div class="profile-stat-label">进行中</div>
            </div>
            <div class="profile-stat-card">
                <div class="profile-stat-value" id="stat-completed">0</div>
                <div class="profile-stat-label">已完成</div>
            </div>
            <div class="profile-stat-card">
                <div class="profile-stat-value" id="stat-total">0</div>
                <div class="profile-stat-label">总项目</div>
            </div>
        </div>
        
        <div class="settings-section">
            <div class="settings-card">
                <div class="setting-item" onclick="showNicknameModal()">
                    <div class="setting-left">
                        <div class="setting-icon">✏️</div>
                        <div class="setting-info">
                            <div class="setting-title">修改昵称</div>
                            <div class="setting-desc">设置你的个性化昵称</div>
                        </div>
                    </div>
                    <span style="color: var(--text-secondary);">›</span>
                </div>
                <div class="setting-item">
                    <div class="setting-left">
                        <div class="setting-icon" id="theme-icon">🌙</div>
                        <div class="setting-info">
                            <div class="setting-title">深色模式</div>
                            <div class="setting-desc">切换白天/黑夜主题</div>
                        </div>
                    </div>
                    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
                        <div class="theme-toggle-thumb" id="theme-thumb">🌙</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建项目页面 -->
    <div id="create-page" class="page">
        <div class="form-page">
            <div class="form-header">
                <button type="button" class="back-btn" onclick="showTab('ongoing')">←</button>
                <h2>创建新计划</h2>
            </div>
            <form id="create-form" onsubmit="handleCreate(event)">
                <div class="form-group">
                    <label class="form-label">计划类型</label>
                    <div class="type-selector">
                        <div class="type-option selected" data-type="course" onclick="selectType('course')">
                            <div class="type-icon">📚</div>
                            <div class="type-name">课程</div>
                        </div>
                        <div class="type-option" data-type="project" onclick="selectType('project')">
                            <div class="type-icon">📁</div>
                            <div class="type-name">项目</div>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">计划名称</label>
                    <input type="text" class="clay-input" id="project-name" placeholder="例如：Python入门课程" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">重要程度</label>
                    <div class="star-picker" id="star-picker">
                        <span class="star filled" onclick="setPriority(1)">★</span>
                        <span class="star filled" onclick="setPriority(2)">★</span>
                        <span class="star filled" onclick="setPriority(3)">★</span>
                        <span class="star" onclick="setPriority(4)">★</span>
                        <span class="star" onclick="setPriority(5)">★</span>
                    </div>
                    <div class="star-label" id="priority-label">三星 - 一般重要</div>
                </div>
                
                <!-- 课程类型专用 -->
                <div class="form-group" id="course-fields">
                    <label class="form-label">总课程集数</label>
                    <input type="number" class="clay-input" id="course-units" placeholder="例如：50" required min="1">
                </div>
                
                <!-- 项目类型专用 -->
                <div class="form-group" id="project-fields" style="display: none;">
                    <label class="form-label">子项目设置</label>
                    <div class="subtask-count-section" id="subtask-count-section">
                        <div class="subtask-count-row">
                            <input type="number" class="subtask-count-input" id="subtask-count" placeholder="数量" min="1" max="20">
                            <button type="button" class="subtask-count-btn" onclick="generateSubtaskInputs()">确定</button>
                        </div>
                    </div>
                    <div class="subtasks-input-container" id="subtasks-input-container"></div>
                    <div id="subtask-confirm-btn-container" style="display: none; margin-top: 16px;">
                        <button type="button" class="submit-btn" onclick="confirmSubtasks()" style="margin-top: 0;">确认子项目</button>
                    </div>
                    <div id="subtask-confirmed-msg" style="display: none; text-align: center; padding: 16px; color: var(--accent-green); font-weight: 600; margin-top: 12px;">
                        ✓ 子项目已确认
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">预计总时长（小时）</label>
                    <input type="number" class="clay-input" id="project-hours" placeholder="例如：30" min="0" step="0.5">
                </div>
                
                <div class="form-group">
                    <label class="form-label">截止日期</label>
                    <input type="date" class="clay-input" id="project-deadline" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">选择颜色标签</label>
                    <div class="color-picker" id="color-picker"></div>
                </div>
                
                <button type="submit" class="submit-btn" id="submit-btn">创建计划</button>
            </form>
        </div>
    </div>

    <!-- 项目详情页 -->
    <div id="detail-page" class="page">
        <div class="top-nav" style="display: flex; align-items: center; padding: 50px 20px 15px; background: var(--bg-card); position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 20px var(--shadow-dark);">
            <button type="button" class="back-btn" onclick="goBack()" style="margin-right: 12px;">←</button>
            <h2 style="flex: 1; text-align: center; font-size: 18px; color: var(--text-primary); margin-right: 56px;">计划详情</h2>
        </div>
        <div id="detail-content"></div>
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="ongoing" onclick="showTab('ongoing')">
            <div class="nav-icon">📋</div>
            <div class="nav-label">进行中</div>
        </div>
        <div class="nav-item" data-tab="completed" onclick="showTab('completed')">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">已完成</div>
        </div>
        <div class="nav-item" data-tab="profile" onclick="showTab('profile')">
            <div class="nav-icon">👤</div>
            <div class="nav-label">我的</div>
        </div>
    </nav>

    <!-- 添加按钮 -->
    <button type="button" class="fab" onclick="showCreatePage()">+</button>

    <!-- 昵称修改模态框 -->
    <div class="modal-overlay" id="nickname-modal">
        <div class="modal-content">
            <div class="modal-title">修改昵称</div>
            <input type="text" class="modal-input" id="nickname-input" placeholder="输入你的昵称" maxlength="12">
            <div class="modal-buttons">
                <button type="button" class="modal-btn cancel" onclick="hideNicknameModal()">取消</button>
                <button type="button" class="modal-btn confirm" onclick="saveNickname()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        const STORAGE_KEY = 'progress_tracker_data_v2';
        const USER_KEY = 'progress_tracker_user_v2';
        const COLORS = ['#A78BFA', '#F472B6', '#60A5FA', '#34D399', '#FBBF24', '#FB923C'];
        
        let projects = [];
        let currentPriority = 3;
        let currentColor = COLORS[0];
        let currentProjectId = null;
        let currentType = 'course';
        let tempSubtaskCount = 0;
        let subtasksConfirmed = false;
        let userSettings = {
            nickname: '',
            theme: 'light'
        };
        let previousTab = 'ongoing';

        // 初始化
        function init() {
            loadData();
            loadUserSettings();
            initColorPicker();
            setDefaultDate();
            renderOngoingList();
            renderCompletedList();
            updateProfileStats();
        }

        // 加载数据
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                projects = JSON.parse(stored).map(project => ({
                    ...project,
                    deadline: new Date(project.deadline),
                    createdAt: new Date(project.createdAt),
                    completedAt: project.completedAt ? new Date(project.completedAt) : null
                }));
            }
        }

        // 保存数据
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        }

        // 加载用户设置
        function loadUserSettings() {
            const stored = localStorage.getItem(USER_KEY);
            if (stored) {
                userSettings = JSON.parse(stored);
                applyTheme(userSettings.theme);
                updateProfileDisplay();
            }
        }

        // 保存用户设置
        function saveUserSettings() {
            localStorage.setItem(USER_KEY, JSON.stringify(userSettings));
        }

        // 应用主题
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const themeColor = theme === 'dark' ? '#1a1a2e' : '#E8EAF6';
            document.getElementById('theme-color').setAttribute('content', themeColor);
            
            const toggle = document.getElementById('theme-toggle');
            const thumb = document.getElementById('theme-thumb');
            const icon = document.getElementById('theme-icon');
            
            if (theme === 'dark') {
                toggle.classList.add('active');
                thumb.textContent = '☀️';
                icon.textContent = '☀️';
            } else {
                toggle.classList.remove('active');
                thumb.textContent = '🌙';
                icon.textContent = '🌙';
            }
        }

        // 切换主题
        function toggleTheme() {
            userSettings.theme = userSettings.theme === 'light' ? 'dark' : 'light';
            applyTheme(userSettings.theme);
            saveUserSettings();
        }

        // 更新个人资料显示
        function updateProfileDisplay() {
            const nameEl = document.getElementById('profile-name');
            const avatarEl = document.getElementById('profile-avatar');
            
            if (userSettings.nickname) {
                nameEl.textContent = userSettings.nickname;
                avatarEl.textContent = userSettings.nickname.charAt(0).toUpperCase();
            } else {
                nameEl.textContent = '未设置昵称';
                avatarEl.textContent = '👤';
            }
        }

        // 显示昵称模态框
        function showNicknameModal() {
            document.getElementById('nickname-input').value = userSettings.nickname || '';
            document.getElementById('nickname-modal').classList.add('active');
        }

        // 隐藏昵称模态框
        function hideNicknameModal() {
            document.getElementById('nickname-modal').classList.remove('active');
        }

        // 保存昵称
        function saveNickname() {
            const nickname = document.getElementById('nickname-input').value.trim();
            if (nickname) {
                userSettings.nickname = nickname;
                saveUserSettings();
                updateProfileDisplay();
            }
            hideNicknameModal();
        }

        // 更新统计
        function updateProfileStats() {
            const ongoing = projects.filter(p => !p.completed).length;
            const completed = projects.filter(p => p.completed).length;
            
            document.getElementById('stat-ongoing').textContent = ongoing;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-total').textContent = projects.length;
        }

        // 页面切换
        function showTab(tab) {
            previousTab = tab;
            
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // 显示选中页面
            document.getElementById(tab + '-page').classList.add('active');
            document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
            
            // 更新列表
            if (tab === 'ongoing') {
                renderOngoingList();
            } else if (tab === 'completed') {
                renderCompletedList();
            } else if (tab === 'profile') {
                updateProfileStats();
            }
            
            // 控制添加按钮显示
            const fab = document.querySelector('.fab');
            const nav = document.querySelector('.bottom-nav');
            if (tab === 'ongoing' || tab === 'completed') {
                fab.style.display = 'flex';
                nav.style.display = 'flex';
            } else {
                fab.style.display = 'none';
                nav.style.display = 'flex';
            }
        }

        // 显示创建页面
        function showCreatePage() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('create-page').classList.add('active');
            document.querySelector('.fab').style.display = 'none';
            document.querySelector('.bottom-nav').style.display = 'none';
            resetForm();
        }

        // 返回
        function goBack() {
            document.querySelector('.bottom-nav').style.display = 'flex';
            showTab(previousTab);
        }

        // 重置表单
        function resetForm() {
            document.getElementById('create-form').reset();
            selectType('course');
            setPriority(3);
            setColor(COLORS[0], document.querySelector('.color-option'));
            setDefaultDate();
            tempSubtaskCount = 0;
            subtasksConfirmed = false;
            document.getElementById('subtasks-input-container').innerHTML = '';
            document.getElementById('subtask-confirm-btn-container').style.display = 'none';
            document.getElementById('subtask-confirmed-msg').style.display = 'none';
            document.getElementById('subtask-count-section').style.opacity = '1';
            document.getElementById('subtasks-input-container').style.opacity = '1';
        }

        // 选择类型
        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.type-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.type === type);
            });
            
            const courseFields = document.getElementById('course-fields');
            const projectFields = document.getElementById('project-fields');
            const courseUnitsInput = document.getElementById('course-units');
            
            if (type === 'course') {
                courseFields.style.display = 'block';
                projectFields.style.display = 'none';
                courseUnitsInput.setAttribute('required', 'required');
            } else {
                courseFields.style.display = 'none';
                projectFields.style.display = 'block';
                courseUnitsInput.removeAttribute('required');
                
                // 重置子项目状态
                tempSubtaskCount = 0;
                subtasksConfirmed = false;
                document.getElementById('subtasks-input-container').innerHTML = '';
                document.getElementById('subtask-confirm-btn-container').style.display = 'none';
                document.getElementById('subtask-confirmed-msg').style.display = 'none';
                document.getElementById('subtask-count-section').style.opacity = '1';
                document.getElementById('subtasks-input-container').style.opacity = '1';
                document.getElementById('subtask-count').value = '';
            }
        }

        // 生成子项目输入框
        function generateSubtaskInputs() {
            const count = parseInt(document.getElementById('subtask-count').value);
            if (!count || count < 1 || count > 20) {
                alert('请输入1-20之间的子项目数量');
                return;
            }
            
            tempSubtaskCount = count;
            const container = document.getElementById('subtasks-input-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= count; i++) {
                const item = document.createElement('div');
                item.className = 'subtask-input-item';
                item.innerHTML = `
                    <div class="subtask-number">${i}</div>
                    <input type="text" class="subtask-name-input" id="subtask-name-${i}" placeholder="子项目 ${i} 名称" required>
                `;
                container.appendChild(item);
            }
            
            // 显示确认按钮
            document.getElementById('subtask-confirm-btn-container').style.display = 'block';
            document.getElementById('subtask-confirmed-msg').style.display = 'none';
            subtasksConfirmed = false;
        }
        
        // 确认子项目
        function confirmSubtasks() {
            // 验证所有子项目都已填写
            for (let i = 1; i <= tempSubtaskCount; i++) {
                const nameInput = document.getElementById(`subtask-name-${i}`);
                if (!nameInput || !nameInput.value.trim()) {
                    alert(`请填写子项目 ${i} 的名称`);
                    return;
                }
            }
            
            subtasksConfirmed = true;
            document.getElementById('subtask-confirm-btn-container').style.display = 'none';
            document.getElementById('subtask-confirmed-msg').style.display = 'block';
            document.getElementById('subtask-count-section').style.opacity = '0.5';
            document.getElementById('subtasks-input-container').style.opacity = '0.7';
            
            // 禁用所有子项目输入框
            const inputs = document.querySelectorAll('.subtask-name-input');
            inputs.forEach(input => input.disabled = true);
        }

        // 初始化颜色选择器
        function initColorPicker() {
            const picker = document.getElementById('color-picker');
            picker.innerHTML = COLORS.map((color, i) => 
                `<div class="color-option ${i === 0 ? 'selected' : ''}" 
                     style="background-color: ${color}" 
                     onclick="setColor('${color}', this)"></div>`
            ).join('');
        }

        // 设置优先级
        function setPriority(priority) {
            currentPriority = priority;
            const stars = document.querySelectorAll('#star-picker .star');
            stars.forEach((star, i) => {
                star.classList.toggle('filled', i < priority);
            });
            const labels = {
                1: '一星 - 不重要',
                2: '二星 - 不太重要',
                3: '三星 - 一般重要',
                4: '四星 - 比较重要',
                5: '五星 - 非常重要'
            };
            document.getElementById('priority-label').textContent = labels[priority];
        }

        // 设置颜色
        function setColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        // 设置默认日期
        function setDefaultDate() {
            const date = new Date();
            date.setDate(date.getDate() + 30);
            document.getElementById('project-deadline').value = date.toISOString().split('T')[0];
        }

        // 创建项目
        function handleCreate(e) {
            e.preventDefault();
            
            let projectData = {
                id: Date.now(),
                name: document.getElementById('project-name').value.trim(),
                type: currentType,
                estimatedHours: parseFloat(document.getElementById('project-hours').value) || 0,
                deadline: new Date(document.getElementById('project-deadline').value),
                color: currentColor,
                priority: currentPriority,
                completed: false,
                createdAt: new Date()
            };
            
            if (currentType === 'course') {
                const units = parseInt(document.getElementById('course-units').value);
                if (!units || units < 1) {
                    alert('请输入有效的课程集数');
                    return;
                }
                projectData.totalUnits = units;
                projectData.completedUnits = 0;
            } else {
                // 项目类型 - 收集所有子项目名称
                if (tempSubtaskCount === 0) {
                    alert('请先输入子项目数量并点击确定');
                    return;
                }
                
                if (!subtasksConfirmed) {
                    alert('请先填写子项目名称并点击"确认子项目"按钮');
                    return;
                }
                
                const subtasks = [];
                for (let i = 1; i <= tempSubtaskCount; i++) {
                    const nameInput = document.getElementById(`subtask-name-${i}`);
                    subtasks.push({
                        id: i,
                        name: nameInput.value.trim(),
                        completed: false
                    });
                }
                
                projectData.subtasks = subtasks;
                projectData.totalUnits = subtasks.length;
                projectData.completedUnits = 0;
            }
            
            projects.push(projectData);
            saveData();
            
            document.querySelector('.bottom-nav').style.display = 'flex';
            showTab('ongoing');
        }

        // 计算项目统计
        function calculateStats(project) {
            const progressPercentage = project.totalUnits > 0 
                ? Math.round((project.completedUnits / project.totalUnits) * 100) 
                : 0;
            const remainingUnits = project.totalUnits - project.completedUnits;
            const daysLeft = Math.max(0, Math.ceil(
                (new Date(project.deadline) - new Date()) / (1000 * 60 * 60 * 24)
            ));
            const dailyRequired = daysLeft > 0 
                ? Math.ceil(remainingUnits / daysLeft) 
                : remainingUnits;
            return { progressPercentage, remainingUnits, daysLeft, dailyRequired };
        }

        // 渲染进行中列表
        function renderOngoingList() {
            const list = document.getElementById('ongoing-list');
            const ongoingProjects = projects.filter(p => !p.completed);
            
            if (ongoingProjects.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">还没有进行中的计划</div>
                        <div class="empty-state-subtext">点击右下角添加新计划</div>
                    </div>
                `;
                return;
            }

            // 排序：先按优先级，再按截止日期
            const sortedProjects = [...ongoingProjects].sort((a, b) => {
                if (b.priority !== a.priority) return b.priority - a.priority;
                return new Date(a.deadline) - new Date(b.deadline);
            });

            list.innerHTML = sortedProjects.map(project => renderProjectCard(project)).join('');
        }

        // 渲染已完成列表
        function renderCompletedList() {
            const list = document.getElementById('completed-list');
            const completedProjects = projects.filter(p => p.completed);
            
            if (completedProjects.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏆</div>
                        <div class="empty-state-text">还没有完成的计划</div>
                        <div class="empty-state-subtext">加油，你一定可以的！</div>
                    </div>
                `;
                return;
            }

            // 按完成时间倒序
            const sortedProjects = [...completedProjects].sort((a, b) => 
                new Date(b.completedAt) - new Date(a.completedAt)
            );

            list.innerHTML = sortedProjects.map(project => renderProjectCard(project, true)).join('');
        }

        // 渲染项目卡片
        function renderProjectCard(project, isCompleted = false) {
            const stats = calculateStats(project);
            const typeLabel = project.type === 'course' ? '课程' : '项目';
            
            return `
                <div class="project-card ${isCompleted ? 'completed' : ''}" 
                     style="--card-color: ${project.color}"
                     onclick="showProjectDetail(${project.id})">
                    <div class="project-header">
                        <div class="project-title-row">
                            <span class="project-name">${escapeHtml(project.name)}</span>
                            <span class="project-type-badge">${typeLabel}</span>
                        </div>
                        <div class="stars">
                            ${Array(project.priority).fill('★').map(() => '<span class="star filled">★</span>').join('')}${Array(5 - project.priority).fill('☆').map(() => '<span class="star">☆</span>').join('')}
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-bar-container">
                            <div class="progress-fill" style="width: ${stats.progressPercentage}%"></div>
                        </div>
                        <div class="progress-text">
                            <span>${project.type === 'course' ? '已完成' : '已完成'} ${project.completedUnits}/${project.totalUnits} ${project.type === 'course' ? '集' : '个'}</span>
                            <span>${stats.progressPercentage}%</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 显示项目详情
        function showProjectDetail(projectId) {
            currentProjectId = projectId;
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            const stats = calculateStats(project);
            const content = document.getElementById('detail-content');
            
            let subtasksHtml = '';
            if (project.type === 'project') {
                // 将子项目排序：未完成的在前，已完成的在后
                const sortedSubtasks = project.subtasks.map((subtask, index) => ({...subtask, originalIndex: index}))
                    .sort((a, b) => {
                        if (a.completed === b.completed) return a.originalIndex - b.originalIndex;
                        return a.completed ? 1 : -1;
                    });
                
                subtasksHtml = `
                    <div class="subtasks-section">
                        <div class="section-title">
                            <span>📋</span>
                            子项目清单
                        </div>
                        <div class="detail-subtask-list">
                            ${sortedSubtasks.map(subtask => `
                                <div class="detail-subtask-item ${subtask.completed ? 'completed' : ''}">
                                    <div class="subtask-checkbox ${subtask.completed ? 'checked' : ''}" 
                                         onclick="toggleSubtask(${subtask.originalIndex})">
                                        ${subtask.completed ? '✓' : ''}
                                    </div>
                                    <div class="detail-subtask-text">${escapeHtml(subtask.name)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                subtasksHtml = `
                    <div class="update-section">
                        <div class="section-title">
                            <span>📝</span>
                            更新进度
                        </div>
                        <div class="update-input-group">
                            <input type="number" class="update-input" id="update-progress" 
                                   value="${project.completedUnits}" min="0" max="${project.totalUnits}">
                            <span style="color: var(--text-secondary); font-weight: 600;">/ ${project.totalUnits}</span>
                            <button type="button" class="update-btn" onclick="updateCourseProgress()">更新</button>
                        </div>
                    </div>
                `;
            }
            
            content.innerHTML = `
                <div class="detail-header">
                    <div class="detail-priority">${'★'.repeat(project.priority)}</div>
                    <h1 class="detail-title">${escapeHtml(project.name)}</h1>
                    <p class="detail-subtitle">预计总时长：${project.estimatedHours}小时 | ${project.type === 'course' ? '课程' : '项目'}</p>
                    <div class="big-progress">
                        <div class="big-progress-bar">
                            <div class="big-progress-fill" style="width: ${stats.progressPercentage}%"></div>
                        </div>
                        <div class="big-progress-text">${stats.progressPercentage}%</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${project.completedUnits}</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.remainingUnits}</div>
                        <div class="stat-label">剩余</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.daysLeft}</div>
                        <div class="stat-label">剩余天数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.dailyRequired}</div>
                        <div class="stat-label">每天需完成</div>
                    </div>
                </div>
                
                ${subtasksHtml}
                
                <button type="button" class="delete-btn" onclick="deleteProject()">删除计划</button>
            `;
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('detail-page').classList.add('active');
            document.querySelector('.fab').style.display = 'none';
            document.querySelector('.bottom-nav').style.display = 'none';
        }

        // 切换子任务完成状态
        function toggleSubtask(index) {
            const project = projects.find(p => p.id === currentProjectId);
            if (!project || project.type !== 'project') return;
            
            project.subtasks[index].completed = !project.subtasks[index].completed;
            project.completedUnits = project.subtasks.filter(s => s.completed).length;
            project.completed = project.completedUnits === project.totalUnits;
            
            if (project.completed) {
                project.completedAt = new Date();
            }
            
            saveData();
            showProjectDetail(currentProjectId);
        }

        // 更新课程进度
        function updateCourseProgress() {
            const progress = parseInt(document.getElementById('update-progress').value) || 0;
            const project = projects.find(p => p.id === currentProjectId);
            if (!project || project.type !== 'course') return;
            
            if (progress >= 0 && progress <= project.totalUnits) {
                project.completedUnits = progress;
                project.completed = project.completedUnits === project.totalUnits;
                
                if (project.completed) {
                    project.completedAt = new Date();
                }
                
                saveData();
                showProjectDetail(currentProjectId);
            }
        }

        // 删除项目
        function deleteProject() {
            if (confirm('确定要删除这个计划吗？')) {
                projects = projects.filter(p => p.id !== currentProjectId);
                saveData();
                document.querySelector('.bottom-nav').style.display = 'flex';
                showTab(previousTab);
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 启动
        init();
    </script>
</body>
</html>
